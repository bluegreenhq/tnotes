version: 2

project_name: tnotes

before:
  hooks:
    - go mod tidy

builds:
  - id: tnotes
    main: .
    binary: tnotes
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

universal_binaries:
  - id: tnotes
    replace: true

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

homebrew_casks:
  - name: tnotes
    repository:
      owner: bluegreenhq
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Casks
    url:
      verified: github.com/bluegreenhq/tnotes
    homepage: "https://github.com/bluegreenhq/tnotes"
    description: "Terminal-based note-taking app"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/tnotes"]
          end
