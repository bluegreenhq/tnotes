version: 2

project_name: tnotes

before:
  hooks:
    - go mod tidy

builds:
  - id: tnotes
    main: .
    binary: tnotes
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

universal_binaries:
  - id: tnotes
    replace: true

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - name: tnotes
    repository:
      owner: bluegreenhq
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/bluegreenhq/tnotes"
    description: "Terminal-based note-taking app"
    license: "MIT"
    install: |
      bin.install "tnotes"
    test: |
      system "#{bin}/tnotes", "version"
